<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="blueGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#001fff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0066ff;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffd700;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffed4e;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Outer Ring -->
  <circle cx="100" cy="100" r="95" fill="none" stroke="url(#blueGradient)" stroke-width="2" opacity="0.6"/>
  
  <!-- Left Wing -->
  <path d="M 50 80 Q 30 60 20 40 Q 25 50 35 65 Q 40 75 50 80" fill="url(#goldGradient)" filter="url(#glow)"/>
  <path d="M 45 90 Q 20 70 10 45 Q 18 60 32 78 Q 40 88 45 90" fill="url(#goldGradient)" opacity="0.8" filter="url(#glow)"/>
  
  <!-- Right Wing -->
  <path d="M 150 80 Q 170 60 180 40 Q 175 50 165 65 Q 160 75 150 80" fill="url(#goldGradient)" filter="url(#glow)"/>
  <path d="M 155 90 Q 180 70 190 45 Q 182 60 168 78 Q 160 88 155 90" fill="url(#goldGradient)" opacity="0.8" filter="url(#glow)"/>
  
  <!-- Center Circle -->
  <circle cx="100" cy="100" r="60" fill="url(#blueGradient)" filter="url(#glow)"/>
  
  <!-- Inner Star -->
  <circle cx="100" cy="100" r="50" fill="none" stroke="url(#goldGradient)" stroke-width="1.5" opacity="0.5"/>
  
  <!-- Letter A -->
  <g filter="url(#glow)">
    <!-- Left Diagonal -->
    <line x1="70" y1="140" x2="90" y2="60" stroke="url(#goldGradient)" stroke-width="8" stroke-linecap="round"/>
    <!-- Right Diagonal -->
    <line x1="110" y1="60" x2="130" y2="140" stroke="url(#goldGradient)" stroke-width="8" stroke-linecap="round"/>
    <!-- Horizontal Bar -->
    <line x1="75" y1="110" x2="125" y2="110" stroke="url(#goldGradient)" stroke-width="6" stroke-linecap="round"/>
  </g>
  
  <!-- Center Top Star -->
  <g transform="translate(100, 50)" opacity="0.9">
    <polygon points="0,-8 2,-2 8,-2 3,2 5,8 0,4 -5,8 -3,2 -8,-2 -2,-2" fill="url(#goldGradient)"/>
  </g>
</svg>
